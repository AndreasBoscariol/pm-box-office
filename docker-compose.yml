services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pm_box_office
      POSTGRES_USER: pm_box_office
      POSTGRES_PASSWORD: pm_box_office
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: uvicorn web.app:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://pm_box_office:pm_box_office@postgres:5432/pm_box_office
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  worker:
    build: .
    command: python3 -m scripts.ingest.amc.jobs.worker
    environment:
      DATABASE_URL: postgresql://pm_box_office:pm_box_office@postgres:5432/pm_box_office
    depends_on:
      - postgres

volumes:
  postgres_data:
