services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pm_box_office
      POSTGRES_USER: pm_box_office
      POSTGRES_PASSWORD: pm_box_office
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: uvicorn pm_box_office.web.app:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://pm_box_office:pm_box_office@postgres:5432/pm_box_office
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  worker:
    build: .
    command:
      - python3
      - -m
      - pm_box_office.sources.amc.jobs.worker
      - --limit
      - ${AMC_WORKER_BATCH_LIMIT:-1}
      - --delay-seconds
      - ${AMC_WORKER_DELAY_SECONDS:-1.0}
    environment:
      DATABASE_URL: postgresql://pm_box_office:pm_box_office@postgres:5432/pm_box_office
    depends_on:
      - postgres

volumes:
  postgres_data:
